<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %} Edu Bridge Funding{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --accent:    #00e5a0;
      --accent2:   #7c3aed;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --error:     #ff4d6d;
      --input-bg:  #16161f;
      --radius:    10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Декоративный фон ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 15%, rgba(124,58,237,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 90% 80%, rgba(0,229,160,.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Сетка точек ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Логотип / заголовок ── */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeDown .5s ease both;
    }
    .brand-logo {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand-sub {
      color: var(--muted);
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: .25rem;
    }

    /* ── Карточка ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 460px;
      animation: fadeUp .5s .1s ease both;
      box-shadow: 0 0 60px rgba(0,0,0,.5);
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: .35rem;
      color: var(--text);
    }
    .card-hint {
      color: var(--muted);
      font-size: .8rem;
      margin-bottom: 1.75rem;
    }

    /* ── Форма ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }
    .form-group {
      margin-bottom: .9rem;
      animation: fadeUp .4s ease both;
    }
    .form-group:nth-child(1)  { animation-delay: .15s }
    .form-group:nth-child(2)  { animation-delay: .18s }
    .form-group:nth-child(3)  { animation-delay: .21s }
    .form-group:nth-child(4)  { animation-delay: .24s }
    .form-group:nth-child(5)  { animation-delay: .27s }
    .form-group:nth-child(6)  { animation-delay: .30s }
    .form-group:nth-child(7)  { animation-delay: .33s }
    .form-group:nth-child(8)  { animation-delay: .36s }
    .form-group:nth-child(9)  { animation-delay: .39s }

    label {
      display: block;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .85rem;
      padding: .6rem .85rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,.1);
    }
    input.error {
      border-color: var(--error);
    }

    .field-errors {
      margin-top: .3rem;
    }
    .field-error {
      color: var(--error);
      font-size: .72rem;
      display: block;
    }

    /* ── Кнопка ── */
    .btn {
      display: block;
      width: 100%;
      margin-top: 1.4rem;
      padding: .75rem;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .04em;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .btn:hover  { opacity: .88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); opacity: 1; }

    /* ── Разделитель / ссылки ── */
    .card-footer {
      text-align: center;
      margin-top: 1.4rem;
      color: var(--muted);
      font-size: .78rem;
    }
    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* ── Сообщения Django ── */
    .messages { margin-bottom: 1.2rem; }
    .msg {
      padding: .6rem .9rem;
      border-radius: 6px;
      font-size: .8rem;
      margin-bottom: .5rem;
    }
    .msg-success { background: rgba(0,229,160,.1);  border: 1px solid rgba(0,229,160,.25); color: var(--accent); }
    .msg-error   { background: rgba(255,77,109,.1); border: 1px solid rgba(255,77,109,.25); color: var(--error); }
    .msg-info    { background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.25); color: #a78bfa; }

    /* ── Non-field errors ── */
    .non-field-errors {
      background: rgba(255,77,109,.08);
      border: 1px solid rgba(255,77,109,.2);
      border-radius: 6px;
      padding: .6rem .9rem;
      margin-bottom: 1rem;
      color: var(--error);
      font-size: .8rem;
    }

    /* ── Профиль ── */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem .75rem;
      margin-top: 1.2rem;
    }
    .profile-item { }
    .profile-key {
      font-size: .68rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .profile-val {
      font-size: .95rem;
      color: var(--text);
      margin-top: .1rem;
    }

    .badge {
      display: inline-block;
      background: rgba(0,229,160,.12);
      border: 1px solid rgba(0,229,160,.25);
      color: var(--accent);
      border-radius: 4px;
      padding: .1rem .55rem;
      font-size: .75rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.4rem 0;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="brand">
    <div class="brand-logo">IUU</div>
    <div class="brand-sub">Hackathon Platform</div>
  </div>

  {% if messages %}
  <div class="messages" style="width:100%;max-width:460px">
    {% for message in messages %}
    <div class="msg msg-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}

</div>
</body>
</html>
